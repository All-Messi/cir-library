name: Deploy to christir.org (Production)

on:
  workflow_dispatch:  # Manual trigger only — click "Run workflow" in GitHub Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.145.0

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build for production
        run: hugo --minify --baseURL "https://christir.org/"

      - name: Deploy to christir-org repo
        run: |
          # Configure git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Clone the target repo
          git clone https://x-access-token:${{ secrets.PRODUCTION_DEPLOY_TOKEN }}@github.com/All-Messi/christir-org.git /tmp/christir-org

          # Clear old files and copy new build
          rm -rf /tmp/christir-org/*
          cp -r public/. /tmp/christir-org/

          # Add CNAME file
          echo "christir.org" > /tmp/christir-org/CNAME

          # Commit and push
          cd /tmp/christir-org
          git add -A
          git diff --staged --quiet || git commit -m "Deploy from cir-library@${{ github.sha }}"
          git push
